    <!-- Menu Design Studio fonts (lazy-loaded; cached after first request) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;600;800&family=Cormorant+Garamond:wght@400;500;700&family=Crimson+Pro:wght@400;600;700&family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&family=Fraunces:wght@400;500;700;900&family=Inter:wght@400;500;600;700&family=Italiana&family=JetBrains+Mono:wght@400;700&family=Lora:wght@400;500;700&family=Manrope:wght@400;600;700&family=Playfair+Display:wght@400;600;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Bootstrap saved theme BEFORE first paint to avoid FOUC
      (function(){
        try {
          var raw = localStorage.getItem('liora-settings');
          var s = raw ? JSON.parse(raw) : {};
          var html = document.documentElement;

          html.dataset.theme = 'light';

          html.dataset.accent  = s.accent  || 'saffron';
          html.dataset.density = s.density || 'comfortable';
          html.dataset.layout  = s.layout  || 'expanded';
          html.dataset.locale  = s.locale  || 'en';
        } catch(e) {}
      })();

      // Tailwind config: map utility colors to CSS variables so theme changes
      // propagate to every existing className in the codebase automatically.
      tailwind.config = {
        darkMode: ['class', '[data-theme="dark"]'],
        theme: {
          extend: {
            colors: {
              // Brand → CSS variables (driven by [data-accent])
              brand: {
                50:  'rgb(var(--brand-50) / <alpha-value>)',
                100: 'rgb(var(--brand-100) / <alpha-value>)',
                200: 'rgb(var(--brand-200) / <alpha-value>)',
                300: 'rgb(var(--brand-300) / <alpha-value>)',
                400: 'rgb(var(--brand-400) / <alpha-value>)',
                500: 'rgb(var(--brand-500) / <alpha-value>)',
                600: 'rgb(var(--brand-600) / <alpha-value>)',
                700: 'rgb(var(--brand-700) / <alpha-value>)',
                800: 'rgb(var(--brand-800) / <alpha-value>)',
                900: 'rgb(var(--brand-900) / <alpha-value>)',
                DEFAULT: 'rgb(var(--brand-500) / <alpha-value>)',
              },
              cream: {
                50:  'rgb(var(--cream-50) / <alpha-value>)',
                100: 'rgb(var(--cream-100) / <alpha-value>)',
                200: 'rgb(var(--cream-200) / <alpha-value>)',
                300: 'rgb(var(--cream-300) / <alpha-value>)',
                400: 'rgb(var(--cream-400) / <alpha-value>)',
              },
              forest: {
                700: 'rgb(var(--forest-700) / <alpha-value>)',
                800: 'rgb(var(--forest-800) / <alpha-value>)',
                900: 'rgb(var(--forest-900) / <alpha-value>)',
                950: 'rgb(var(--forest-950) / <alpha-value>)',
              },
              stone: {
                100: 'rgb(var(--stone-100) / <alpha-value>)',
                200: 'rgb(var(--stone-200) / <alpha-value>)',
                300: 'rgb(var(--stone-300) / <alpha-value>)',
                400: 'rgb(var(--stone-400) / <alpha-value>)',
                500: 'rgb(var(--stone-500) / <alpha-value>)',
                600: 'rgb(var(--stone-600) / <alpha-value>)',
                700: 'rgb(var(--stone-700) / <alpha-value>)',
                800: 'rgb(var(--stone-800) / <alpha-value>)',
                900: 'rgb(var(--stone-900) / <alpha-value>)',
              },
              surface: {
                50:  'rgb(var(--surface-50)  / <alpha-value>)',
                100: 'rgb(var(--surface-100) / <alpha-value>)',
                200: 'rgb(var(--surface-200) / <alpha-value>)',
                300: 'rgb(var(--surface-300) / <alpha-value>)',
                400: 'rgb(var(--surface-400) / <alpha-value>)',
                500: 'rgb(var(--surface-500) / <alpha-value>)',
                600: 'rgb(var(--surface-600) / <alpha-value>)',
                700: 'rgb(var(--surface-700) / <alpha-value>)',
                800: 'rgb(var(--surface-800) / <alpha-value>)',
                900: 'rgb(var(--surface-900) / <alpha-value>)',
                950: 'rgb(var(--surface-950) / <alpha-value>)',
              },
            },
            fontFamily: {
              sans:    ['Plus Jakarta Sans', 'Inter', 'system-ui', 'sans-serif'],
              serif:   ['"Fraunces"', 'Georgia', 'serif'],
              display: ['"Fraunces"', 'Georgia', 'serif'],
              lora:    ['"Fraunces"', 'Lora', 'Georgia', 'serif'],
              mono:    ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
            },
            animation: {
              'fade-up':    'fadeUp .6s cubic-bezier(.16,1,.3,1) forwards',
              'fade-in':    'fadeIn .5s ease-out forwards',
              'page-slide': 'pageSlide .35s cubic-bezier(.16,1,.3,1) forwards',
              'slide-up':   'slideUp .4s cubic-bezier(.16,1,.3,1) forwards',
              'shimmer':    'shimmer 2s linear infinite',
              'pulse-soft': 'pulseSoft 2.4s ease-in-out infinite',
            },
            keyframes: {
              fadeUp:    { '0%':{ opacity:0, transform:'translateY(16px)' }, '100%':{ opacity:1, transform:'translateY(0)' } },
              fadeIn:    { '0%':{ opacity:0 }, '100%':{ opacity:1 } },
              pageSlide: { '0%':{ opacity:0, transform:'translateY(8px)' }, '100%':{ opacity:1, transform:'translateY(0)' } },
              slideUp:   { '0%':{ opacity:0, transform:'translateY(40px)' }, '100%':{ opacity:1, transform:'translateY(0)' } },
              shimmer:   { '0%':{ backgroundPosition:'-200% 0' }, '100%':{ backgroundPosition:'200% 0' } },
              pulseSoft: { '0%,100%':{ opacity:1 }, '50%':{ opacity:.7 } },
            },
            boxShadow: {
              'pop':   '0 1px 2px rgb(0 0 0 / 0.04), 0 8px 24px rgb(0 0 0 / 0.06)',
              'lift':  '0 2px 4px rgb(0 0 0 / 0.04), 0 12px 36px rgb(0 0 0 / 0.10)',
              'glow':  '0 0 0 1px rgb(var(--brand-500) / .15), 0 8px 28px rgb(var(--brand-500) / .25)',
              'inner-soft': 'inset 0 1px 0 rgb(255 255 255 / 0.06)',
            },
          },
        },
      };
    </script>

    <style>
      /* =====================================================================
         Liora · Vibrant & Appetizing Design System
         All color tokens are CSS variables so they re-theme at runtime
         based on [data-theme], [data-accent], [data-density].
         ===================================================================== */

      :root {
        /* Surface (light) ---------------------------------------- */
        --bg:           255 248 240;   /* page background — warm cream */
        --bg-elev:      255 252 246;   /* slight lift */
        --surface-50:   255 252 246;
        --surface-100:  250 244 234;
        --surface-200:  240 231 217;
        --surface-300:  225 213 193;
        --surface-400:  176 162 142;
        --surface-500:  128 116 100;
        --surface-600:  92  82  70;
        --surface-700:  64  55  47;
        --surface-800:  40  32  27;
        --surface-900:  26  19  16;
        --surface-950:  16  11  9;

        --cream-50:  255 250 245;
        --cream-100: 250 243 232;
        --cream-200: 240 228 207;
        --cream-300: 224 208 180;
        --cream-400: 200 180 148;

        --stone-100: 247 243 237;
        --stone-200: 232 224 211;
        --stone-300: 210 199 184;
        --stone-400: 156 140 122;
        --stone-500: 110 96  82;
        --stone-600: 80  68  58;
        --stone-700: 58  47  39;
        --stone-800: 36  28  22;
        --stone-900: 22  16  12;

        --forest-700: 50  92  72;
        --forest-800: 36  72  56;
        --forest-900: 26  56  44;
        --forest-950: 16  38  30;

        --text-default:  rgb(var(--stone-900));
        --text-muted:    rgb(var(--stone-500));
        --text-subtle:   rgb(var(--stone-400));
        --border-soft:   rgb(var(--cream-200));
        --border-strong: rgb(var(--cream-300));

        /* Density — spacing scale -------------------------------- */
        --density-pad: 1rem;     /* comfortable */
        --density-gap: 0.75rem;
        --radius-md:   1rem;
        --radius-lg:   1.5rem;
        --radius-xl:   2rem;

        /* Default accent (Saffron — warm tomato-orange) ---------- */
        --brand-50:  255 243 233;
        --brand-100: 255 226 207;
        --brand-200: 255 197 161;
        --brand-300: 255 158 107;
        --brand-400: 245 113 60;
        --brand-500: 232 93  42;     /* primary */
        --brand-600: 200 71  28;
        --brand-700: 158 53  18;
        --brand-800: 115 38  13;
        --brand-900: 76  24  8;
      }

      /* ==== Density variants ================================= */
      [data-density="compact"]     { --density-pad: 0.625rem; --density-gap: 0.5rem;  --radius-md: 0.75rem; --radius-lg: 1rem;    --radius-xl: 1.25rem; font-size: 14px; }
      [data-density="comfortable"] { --density-pad: 1rem;     --density-gap: 0.75rem; --radius-md: 1rem;    --radius-lg: 1.5rem;  --radius-xl: 2rem;    font-size: 15px; }
      [data-density="spacious"]    { --density-pad: 1.5rem;   --density-gap: 1rem;    --radius-md: 1.25rem; --radius-lg: 1.75rem; --radius-xl: 2.25rem; font-size: 16px; }

      /* ==== Accent palettes ================================== */
      [data-accent="saffron"] {
        --brand-50:255 243 233; --brand-100:255 226 207; --brand-200:255 197 161;
        --brand-300:255 158 107; --brand-400:245 113 60; --brand-500:232 93 42;
        --brand-600:200 71 28;  --brand-700:158 53 18;  --brand-800:115 38 13; --brand-900:76 24 8;
      }
      [data-accent="truffle"] {
        --brand-50:232 245 238; --brand-100:200 232 215; --brand-200:158 215 184;
        --brand-300:108 192 148; --brand-400:60 165 110; --brand-500:31 139 92;
        --brand-600:24 110 73;  --brand-700:18 84  56;  --brand-800:14 62 41;  --brand-900:9 42 28;
      }
      [data-accent="sunset"] {
        --brand-50:255 240 220; --brand-100:255 220 184; --brand-200:255 192 138;
        --brand-300:255 158 90;  --brand-400:255 124 50;  --brand-500:249 100 24;
        --brand-600:215 80 12;  --brand-700:170 62 8;    --brand-800:125 45 5;  --brand-900:82 29 3;
      }
      [data-accent="berry"] {
        --brand-50:253 232 244; --brand-100:251 207 232; --brand-200:248 168 213;
        --brand-300:244 114 182; --brand-400:236 72 153; --brand-500:219 39 119;
        --brand-600:190 24 93;  --brand-700:157 23 77;  --brand-800:120 18 60; --brand-900:80 12 40;
      }
      [data-accent="citrus"] {
        --brand-50:254 250 215; --brand-100:254 240 138; --brand-200:253 224 71;
        --brand-300:250 204 21;  --brand-400:234 179 8;  --brand-500:202 138 4;
        --brand-600:161 98 7;   --brand-700:133 77 14;  --brand-800:113 63 18; --brand-900:80 45 12;
      }
      [data-accent="espresso"] {
        --brand-50:248 235 220; --brand-100:235 210 178; --brand-200:212 175 130;
        --brand-300:188 138 88;  --brand-400:158 105 58;  --brand-500:135 84 38;
        --brand-600:108 65 28;  --brand-700:84 48 20;   --brand-800:62 34 14;  --brand-900:42 22 9;
      }

      /* ==== Dark mode ======================================== */
      [data-theme="dark"] {
        --bg:           14 11  9;
        --bg-elev:      24 18  14;
        --surface-50:   28 22  18;
        --surface-100:  36 28  22;
        --surface-200:  48 38  30;
        --surface-300:  64 51  41;
        --surface-400:  92 74  60;
        --surface-500:  140 120 102;
        --surface-600:  176 158 138;
        --surface-700:  208 193 174;
        --surface-800:  232 220 204;
        --surface-900:  248 240 228;
        --surface-950:  255 250 240;

        --cream-50:  28 22  18;
        --cream-100: 36 28  22;
        --cream-200: 56 44  35;
        --cream-300: 80 64  52;
        --cream-400: 130 110 92;

        --stone-100: 36 28  22;
        --stone-200: 56 44  35;
        --stone-300: 88 72  60;
        --stone-400: 156 140 122;
        --stone-500: 188 174 156;
        --stone-600: 218 206 188;
        --stone-700: 235 226 212;
        --stone-800: 246 238 226;
        --stone-900: 252 246 236;

        --forest-700: 80 138 110;
        --forest-800: 60 112 88;
        --forest-900: 42 88  68;
        --forest-950: 28 64  50;

        --text-default:  rgb(var(--stone-900));
        --text-muted:    rgb(var(--stone-500));
        --text-subtle:   rgb(var(--stone-400));
        --border-soft:   rgb(var(--cream-200));
        --border-strong: rgb(var(--cream-300));
      }

      /* ==== Base styles ====================================== */
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
        background: rgb(var(--bg));
        color: var(--text-default);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        font-feature-settings: "ss01", "cv11";
      }

      .font-display, .font-serif, .font-lora {
        font-family: 'Fraunces', 'Cormorant Garamond', Georgia, serif;
        font-optical-sizing: auto;
        letter-spacing: -0.01em;
      }

      ::selection { background: rgb(var(--brand-500) / .25); color: var(--text-default); }

      /* ==== Scrollbars ======================================= */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgb(var(--cream-300) / .6); border-radius: 999px; border: 2px solid transparent; background-clip: padding-box; }
      ::-webkit-scrollbar-thumb:hover { background: rgb(var(--cream-400) / .9); background-clip: padding-box; border: 2px solid transparent; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .custom-scrollbar { scrollbar-width: thin; scrollbar-color: rgb(var(--cream-300) / .6) transparent; }

      /* ==== Cards ============================================ */
      .card {
        background: rgb(var(--surface-50));
        border: 1px solid rgb(var(--cream-200));
        border-radius: var(--radius-lg);
        transition: box-shadow .25s ease, transform .25s ease, border-color .25s ease;
      }
      .card-hover:hover { box-shadow: 0 12px 36px -12px rgb(var(--brand-500) / .18); border-color: rgb(var(--brand-300) / .5); transform: translateY(-2px); }
      .card-cream { background: rgb(var(--cream-100)); border: 1px solid rgb(var(--cream-200)); border-radius: var(--radius-lg); }
      .card-elev  { background: rgb(var(--surface-50)); border: 1px solid rgb(var(--cream-200)); border-radius: var(--radius-lg); box-shadow: 0 1px 2px rgb(0 0 0 / 0.04), 0 8px 24px rgb(0 0 0 / 0.06); }

      /* ==== Buttons ========================================== */
      .btn-gold,
      .btn-primary {
        display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
        background: linear-gradient(135deg, rgb(var(--brand-500)) 0%, rgb(var(--brand-600)) 100%);
        color: #fff; font-weight: 600; border-radius: 999px;
        padding: .625rem 1.25rem; font-size: .875rem;
        box-shadow: 0 1px 0 rgb(255 255 255 / .1) inset, 0 8px 22px -10px rgb(var(--brand-500) / .55);
        transition: all .2s ease;
        border: none; cursor: pointer;
      }
      .btn-gold:hover, .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 1px 0 rgb(255 255 255 / .15) inset, 0 12px 30px -10px rgb(var(--brand-500) / .65); }
      .btn-gold:active, .btn-primary:active { transform: translateY(0); }

      .btn-gold-outline,
      .btn-outline {
        display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
        border: 1.5px solid rgb(var(--brand-500));
        color: rgb(var(--brand-600));
        background: transparent; font-weight: 600; border-radius: 999px;
        padding: .55rem 1.2rem; font-size: .875rem;
        transition: all .2s ease; cursor: pointer;
      }
      .btn-gold-outline:hover, .btn-outline:hover { background: rgb(var(--brand-500)); color: #fff; }

      .btn-ghost {
        display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
        color: var(--text-muted); background: transparent; font-weight: 500; border-radius: 999px;
        padding: .55rem 1rem; font-size: .875rem; transition: all .15s ease; border: 1px solid transparent; cursor: pointer;
      }
      .btn-ghost:hover { background: rgb(var(--cream-100)); color: var(--text-default); }

      .btn-circle-gold {
        width: 48px; height: 48px;
        background: linear-gradient(135deg, rgb(var(--brand-500)), rgb(var(--brand-600)));
        border-radius: 9999px; display: inline-flex; align-items: center; justify-content: center;
        color: #fff; flex-shrink: 0; box-shadow: 0 8px 22px -8px rgb(var(--brand-500) / .55);
        transition: transform .2s ease, box-shadow .2s ease;
      }
      .btn-circle-gold:hover { transform: scale(1.06); box-shadow: 0 12px 28px -8px rgb(var(--brand-500) / .7); }

      /* ==== Section / glass / forest ======================== */
      .section-forest {
        background:
          radial-gradient(1200px 600px at 20% 0%, rgb(var(--brand-500) / .12), transparent 60%),
          linear-gradient(135deg, rgb(var(--forest-900)) 0%, rgb(var(--forest-950)) 100%);
        color: rgb(var(--cream-50));
      }
      .glass         { background: rgb(255 255 255 / .65); backdrop-filter: blur(18px) saturate(140%); border: 1px solid rgb(255 255 255 / .9); }
      .glass-light   { background: rgb(255 255 255 / .50); backdrop-filter: blur(14px); border: 1px solid rgb(var(--cream-200) / .6); }
      .glass-heavy   { background: rgb(var(--surface-50) / .88); backdrop-filter: blur(28px) saturate(150%); border: 1px solid rgb(var(--cream-200)); }
      [data-theme="dark"] .glass         { background: rgb(var(--surface-100) / .55); border: 1px solid rgb(255 255 255 / .06); }
      [data-theme="dark"] .glass-light   { background: rgb(var(--surface-100) / .4);  border: 1px solid rgb(255 255 255 / .05); }
      [data-theme="dark"] .glass-heavy   { background: rgb(var(--surface-100) / .85); border: 1px solid rgb(255 255 255 / .08); }

      /* ============================================================
         DARK MODE GLOBAL CONTRAST PATCH
         Most components use bg-white + literal Tailwind palette colors
         that don't auto-flip. Remap them globally so text stays legible
         without touching every component.
         ============================================================ */
      [data-theme="dark"] {
        color-scheme: dark;
      }

      /* --- Surfaces: bg-white = card surface in dark mode ---------- */
      [data-theme="dark"] .bg-white         { background-color: rgb(var(--surface-100)) !important; }
      [data-theme="dark"] .bg-white\/80     { background-color: rgb(var(--surface-100) / .85) !important; }
      [data-theme="dark"] .bg-white\/70     { background-color: rgb(var(--surface-100) / .75) !important; }
      [data-theme="dark"] .bg-white\/60     { background-color: rgb(var(--surface-100) / .65) !important; }
      [data-theme="dark"] .bg-white\/50     { background-color: rgb(var(--surface-100) / .55) !important; }
      [data-theme="dark"] .bg-white\/40     { background-color: rgb(var(--surface-100) / .45) !important; }
      [data-theme="dark"] .bg-white\/30     { background-color: rgb(var(--surface-100) / .35) !important; }
      [data-theme="dark"] .bg-white\/20     { background-color: rgb(var(--surface-100) / .25) !important; }
      [data-theme="dark"] .bg-white\/10     { background-color: rgb(255 255 255 / .08) !important; }
      [data-theme="dark"] .bg-white\/5      { background-color: rgb(255 255 255 / .04) !important; }
      [data-theme="dark"] .hover\:bg-white:hover { background-color: rgb(var(--surface-200)) !important; }

      /* --- Built-in gray/slate/neutral/zinc text → readable in dark - */
      [data-theme="dark"] .text-gray-900,  [data-theme="dark"] .text-slate-900,
      [data-theme="dark"] .text-neutral-900,[data-theme="dark"] .text-zinc-900   { color: rgb(252 246 236) !important; }
      [data-theme="dark"] .text-gray-800,  [data-theme="dark"] .text-slate-800,
      [data-theme="dark"] .text-neutral-800,[data-theme="dark"] .text-zinc-800   { color: rgb(246 238 226) !important; }
      [data-theme="dark"] .text-gray-700,  [data-theme="dark"] .text-slate-700,
      [data-theme="dark"] .text-neutral-700,[data-theme="dark"] .text-zinc-700   { color: rgb(232 222 206) !important; }
      [data-theme="dark"] .text-gray-600,  [data-theme="dark"] .text-slate-600,
      [data-theme="dark"] .text-neutral-600,[data-theme="dark"] .text-zinc-600   { color: rgb(210 200 184) !important; }
      [data-theme="dark"] .text-gray-500,  [data-theme="dark"] .text-slate-500,
      [data-theme="dark"] .text-neutral-500,[data-theme="dark"] .text-zinc-500   { color: rgb(180 168 152) !important; }
      [data-theme="dark"] .text-gray-400,  [data-theme="dark"] .text-slate-400,
      [data-theme="dark"] .text-neutral-400,[data-theme="dark"] .text-zinc-400   { color: rgb(150 138 122) !important; }
      [data-theme="dark"] .text-black                                            { color: rgb(252 246 236) !important; }

      /* --- Built-in gray/slate backgrounds → dark surfaces ---------- */
      [data-theme="dark"] .bg-gray-50,  [data-theme="dark"] .bg-slate-50,
      [data-theme="dark"] .bg-neutral-50,[data-theme="dark"] .bg-zinc-50         { background-color: rgb(var(--surface-100)) !important; }
      [data-theme="dark"] .bg-gray-100, [data-theme="dark"] .bg-slate-100,
      [data-theme="dark"] .bg-neutral-100,[data-theme="dark"] .bg-zinc-100       { background-color: rgb(var(--surface-200)) !important; }
      [data-theme="dark"] .bg-gray-200, [data-theme="dark"] .bg-slate-200,
      [data-theme="dark"] .bg-neutral-200,[data-theme="dark"] .bg-zinc-200       { background-color: rgb(var(--surface-300)) !important; }
      [data-theme="dark"] .border-gray-200, [data-theme="dark"] .border-slate-200,
      [data-theme="dark"] .border-neutral-200,[data-theme="dark"] .border-zinc-200{ border-color: rgb(var(--surface-300)) !important; }
      [data-theme="dark"] .border-gray-300, [data-theme="dark"] .border-slate-300,
      [data-theme="dark"] .border-neutral-300,[data-theme="dark"] .border-zinc-300{ border-color: rgb(var(--surface-400) / .6) !important; }

      /* --- Tinted nav-pill idle backgrounds: pastel-50/100 → muted dark
             Active gradients (from-x-300 via-x-500 to-x-700) stay vibrant. */
      [data-theme="dark"] .bg-amber-50,    [data-theme="dark"] .bg-amber-100    { background-color: rgb(120 75 20 / .35) !important; }
      [data-theme="dark"] .bg-rose-50,     [data-theme="dark"] .bg-rose-100     { background-color: rgb(140 40 70 / .32) !important; }
      [data-theme="dark"] .bg-violet-50,   [data-theme="dark"] .bg-violet-100   { background-color: rgb(90 60 160 / .35) !important; }
      [data-theme="dark"] .bg-emerald-50,  [data-theme="dark"] .bg-emerald-100  { background-color: rgb(20 100 75 / .35) !important; }
      [data-theme="dark"] .bg-sky-50,      [data-theme="dark"] .bg-sky-100      { background-color: rgb(20 90 140 / .35) !important; }
      [data-theme="dark"] .bg-fuchsia-50,  [data-theme="dark"] .bg-fuchsia-100  { background-color: rgb(140 40 130 / .32) !important; }
      [data-theme="dark"] .bg-orange-50,   [data-theme="dark"] .bg-orange-100   { background-color: rgb(150 70 20 / .35) !important; }
      [data-theme="dark"] .bg-indigo-50,   [data-theme="dark"] .bg-indigo-100   { background-color: rgb(50 60 160 / .35) !important; }
      [data-theme="dark"] .bg-teal-50,     [data-theme="dark"] .bg-teal-100     { background-color: rgb(20 100 100 / .35) !important; }
      [data-theme="dark"] .bg-pink-50,     [data-theme="dark"] .bg-pink-100     { background-color: rgb(150 50 100 / .32) !important; }
      [data-theme="dark"] .bg-yellow-50,   [data-theme="dark"] .bg-yellow-100   { background-color: rgb(130 100 20 / .35) !important; }
      [data-theme="dark"] .bg-green-50,    [data-theme="dark"] .bg-green-100    { background-color: rgb(30 100 50 / .35) !important; }
      [data-theme="dark"] .bg-red-50,      [data-theme="dark"] .bg-red-100      { background-color: rgb(150 40 40 / .35) !important; }
      [data-theme="dark"] .bg-blue-50,     [data-theme="dark"] .bg-blue-100     { background-color: rgb(30 80 160 / .35) !important; }
      [data-theme="dark"] .bg-purple-50,   [data-theme="dark"] .bg-purple-100   { background-color: rgb(95 50 160 / .35) !important; }

      /* --- Tinted text on dark surfaces: 700/800 dark text → 200/300 lift  */
      [data-theme="dark"] .text-amber-700,  [data-theme="dark"] .text-amber-800,  [data-theme="dark"] .text-amber-900   { color: rgb(252 211 77) !important; }
      [data-theme="dark"] .text-rose-700,   [data-theme="dark"] .text-rose-800,   [data-theme="dark"] .text-rose-900    { color: rgb(253 164 175) !important; }
      [data-theme="dark"] .text-violet-700, [data-theme="dark"] .text-violet-800, [data-theme="dark"] .text-violet-900  { color: rgb(196 181 253) !important; }
      [data-theme="dark"] .text-emerald-700,[data-theme="dark"] .text-emerald-800,[data-theme="dark"] .text-emerald-900 { color: rgb(110 231 183) !important; }
      [data-theme="dark"] .text-sky-700,    [data-theme="dark"] .text-sky-800,    [data-theme="dark"] .text-sky-900     { color: rgb(125 211 252) !important; }
      [data-theme="dark"] .text-fuchsia-700,[data-theme="dark"] .text-fuchsia-800,[data-theme="dark"] .text-fuchsia-900 { color: rgb(240 171 252) !important; }
      [data-theme="dark"] .text-orange-700, [data-theme="dark"] .text-orange-800, [data-theme="dark"] .text-orange-900  { color: rgb(253 186 116) !important; }
      [data-theme="dark"] .text-indigo-700, [data-theme="dark"] .text-indigo-800, [data-theme="dark"] .text-indigo-900  { color: rgb(165 180 252) !important; }
      [data-theme="dark"] .text-teal-700,   [data-theme="dark"] .text-teal-800,   [data-theme="dark"] .text-teal-900    { color: rgb(94 234 212) !important; }
      [data-theme="dark"] .text-pink-700,   [data-theme="dark"] .text-pink-800,   [data-theme="dark"] .text-pink-900    { color: rgb(249 168 212) !important; }
      [data-theme="dark"] .text-yellow-700, [data-theme="dark"] .text-yellow-800, [data-theme="dark"] .text-yellow-900  { color: rgb(253 224 71) !important; }
      [data-theme="dark"] .text-green-700,  [data-theme="dark"] .text-green-800,  [data-theme="dark"] .text-green-900   { color: rgb(134 239 172) !important; }
      [data-theme="dark"] .text-red-700,    [data-theme="dark"] .text-red-800,    [data-theme="dark"] .text-red-900     { color: rgb(252 165 165) !important; }
      [data-theme="dark"] .text-blue-700,   [data-theme="dark"] .text-blue-800,   [data-theme="dark"] .text-blue-900    { color: rgb(147 197 253) !important; }
      [data-theme="dark"] .text-purple-700, [data-theme="dark"] .text-purple-800, [data-theme="dark"] .text-purple-900  { color: rgb(216 180 254) !important; }

      /* --- Borders for tinted pills in dark: white/80 → subtle white --- */
      [data-theme="dark"] .border-white,
      [data-theme="dark"] .border-white\/80,
      [data-theme="dark"] .border-white\/60 { border-color: rgb(255 255 255 / .08) !important; }
      [data-theme="dark"] .border-white\/40 { border-color: rgb(255 255 255 / .06) !important; }

      /* --- Inputs/textareas/selects: bg-white + light text gets fixed by
             the bg-white rule above; ensure placeholder remains visible. */
      [data-theme="dark"] input::placeholder,
      [data-theme="dark"] textarea::placeholder { color: rgb(168 156 140) !important; }

      /* --- Cream backgrounds keep working (they're already var-based),
             but cream-50/cream-100 utilities used as text-on-light:
             ensure stronger text on those tokens. */
      [data-theme="dark"] .text-cream-50,
      [data-theme="dark"] .text-cream-100 { color: rgb(252 246 236) !important; }

      /* --- Ring colors for focused inputs in dark mode --------------- */
      [data-theme="dark"] .ring-stone-200\/70,
      [data-theme="dark"] .ring-stone-200 { --tw-ring-color: rgb(var(--surface-300) / .8) !important; }
      [data-theme="dark"] .ring-cream-200,
      [data-theme="dark"] .ring-cream-300 { --tw-ring-color: rgb(var(--cream-300) / .6) !important; }

      /* --- Active sidebar pill (white bg) lifts to elevated surface --- */
      [data-theme="dark"] .bg-white.shadow-sm.ring-1 { background-color: rgb(var(--surface-200)) !important; }

      /* ==== Text utilities ================================== */
      .text-gradient {
        background: linear-gradient(120deg, rgb(var(--brand-400)) 0%, rgb(var(--brand-600)) 60%, rgb(var(--brand-400)) 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .text-muted   { color: var(--text-muted); }
      .text-subtle  { color: var(--text-subtle); }
      .divider      { border-top: 1px solid rgb(var(--cream-200)); }

      /* ==== Tags ============================================ */
      .tag {
        font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
        padding: 4px 10px; border: 1px solid rgb(var(--cream-300)); border-radius: 999px;
        color: var(--text-muted); background: rgb(var(--surface-50) / .6);
      }
      .tag-gold {
        font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
        padding: 4px 12px; background: linear-gradient(135deg, rgb(var(--brand-500)), rgb(var(--brand-600)));
        color: #fff; border-radius: 999px; box-shadow: 0 6px 16px -6px rgb(var(--brand-500) / .55);
      }
      .tag-soft {
        font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
        padding: 4px 10px; background: rgb(var(--brand-500) / .12); color: rgb(var(--brand-600));
        border-radius: 999px;
      }

      /* ==== Inputs ========================================== */
      .input {
        width: 100%; padding: .625rem .875rem; font-size: .875rem;
        background: rgb(var(--surface-50)); color: var(--text-default);
        border: 1px solid rgb(var(--cream-200)); border-radius: var(--radius-md);
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      .input:focus { outline: none; border-color: rgb(var(--brand-400)); box-shadow: 0 0 0 4px rgb(var(--brand-500) / .12); }

      /* ==== Skeleton / shimmer ============================== */
      .skeleton {
        background: linear-gradient(90deg, rgb(var(--cream-200) / .5) 0%, rgb(var(--cream-100)) 50%, rgb(var(--cream-200) / .5) 100%);
        background-size: 200% 100%; animation: shimmer 2s linear infinite; border-radius: var(--radius-md);
      }

      /* ==== Safe areas ====================================== */
      .pb-safe   { padding-bottom: max(env(safe-area-inset-bottom, 0px), 0px); }
      .pt-safe   { padding-top: max(env(safe-area-inset-top, 0px), 0px); }
      .pl-safe   { padding-left: max(env(safe-area-inset-left, 0px), 0px); }
      .pr-safe   { padding-right: max(env(safe-area-inset-right, 0px), 0px); }
      .px-safe   { padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px); }
      .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom, 0px); }
      .safe-area-top    { padding-top: env(safe-area-inset-top, 0px); }
      .min-h-dscreen { min-height: 100vh; min-height: 100dvh; }
      .h-dscreen     { height: 100vh; height: 100dvh; }

      /* Mobile: ≥44px touch targets, prevent text-size auto-bump on iOS landscape, no zoom on input focus */
      @media (max-width: 768px) {
        button, a, [role="button"], input[type="button"], input[type="submit"] {
          min-height: 40px;
        }
        input, select, textarea {
          font-size: 16px !important; /* iOS focus-zoom prevention */
        }
        html { -webkit-text-size-adjust: 100%; }
      }
      /* Tap highlight + smoother scroll on mobile */
      html { -webkit-tap-highlight-color: transparent; }
      body { overscroll-behavior-y: none; }
      /* Standalone (PWA) tweaks — only disable selection on chrome (nav, buttons), keep content selectable */
      @media (display-mode: standalone) {
        nav, header, aside, button, [role="button"] { -webkit-user-select: none; user-select: none; }
      }

      /* ==== Vibrant noise/texture overlay (optional) ======== */
      .grain::before {
        content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 1;
        opacity: .035;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.65'/></svg>");
      }

      /* ==== Background utility ============================== */
      .bg-app  { background: rgb(var(--bg)); }
      .bg-app-elev { background: rgb(var(--bg-elev)); }

      /* ==== Premium scroll-reveal ============================ */
      .reveal              { opacity: 0; transform: translateY(28px); transition: opacity .9s cubic-bezier(.16,1,.3,1), transform .9s cubic-bezier(.16,1,.3,1); will-change: opacity, transform; }
      .reveal.is-visible   { opacity: 1; transform: translateY(0); }
      .reveal-left         { opacity: 0; transform: translateX(-32px); transition: opacity 1s cubic-bezier(.16,1,.3,1), transform 1s cubic-bezier(.16,1,.3,1); }
      .reveal-left.is-visible  { opacity: 1; transform: translateX(0); }
      .reveal-right        { opacity: 0; transform: translateX(32px); transition: opacity 1s cubic-bezier(.16,1,.3,1), transform 1s cubic-bezier(.16,1,.3,1); }
      .reveal-right.is-visible { opacity: 1; transform: translateX(0); }
      .reveal-zoom         { opacity: 0; transform: scale(.96); transition: opacity 1.1s ease, transform 1.1s ease; }
      .reveal-zoom.is-visible  { opacity: 1; transform: scale(1); }
      .reveal-mask         { clip-path: inset(0 100% 0 0); transition: clip-path .85s cubic-bezier(.7,0,.2,1); }
      .reveal-mask.is-visible  { clip-path: inset(0 0 0 0); }
      .reveal-stagger > *  { opacity: 0; transform: translateY(24px); transition: opacity .7s ease, transform .7s cubic-bezier(.16,1,.3,1); }
      .reveal-stagger.is-visible > *           { opacity: 1; transform: translateY(0); }
      .reveal-stagger.is-visible > *:nth-child(1) { transition-delay: 0ms; }
      .reveal-stagger.is-visible > *:nth-child(2) { transition-delay: 80ms; }
      .reveal-stagger.is-visible > *:nth-child(3) { transition-delay: 160ms; }
      .reveal-stagger.is-visible > *:nth-child(4) { transition-delay: 240ms; }
      .reveal-stagger.is-visible > *:nth-child(5) { transition-delay: 320ms; }
      .reveal-stagger.is-visible > *:nth-child(6) { transition-delay: 400ms; }
      .reveal-stagger.is-visible > *:nth-child(7) { transition-delay: 480ms; }
      .reveal-stagger.is-visible > *:nth-child(8) { transition-delay: 560ms; }

      /* ==== Marquee ========================================== */
      @keyframes marquee     { from { transform: translateX(0); } to { transform: translateX(-50%); } }
      @keyframes marqueeRev  { from { transform: translateX(-50%); } to { transform: translateX(0); } }
      .marquee-track         { display: flex; gap: 4rem; width: max-content; animation: marquee 38s linear infinite; }
      .marquee-track-rev     { display: flex; gap: 4rem; width: max-content; animation: marqueeRev 48s linear infinite; }
      .marquee-mask          {
        mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
      }

      /* ==== Float / glow ====================================== */
      @keyframes floatY      { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
      .anim-float            { animation: floatY 7s ease-in-out infinite; }
      @keyframes glowPulse   { 0%,100% { box-shadow: 0 0 0 0 rgb(var(--brand-500) / .35); } 50% { box-shadow: 0 0 0 18px rgb(var(--brand-500) / 0); } }
      .anim-glow             { animation: glowPulse 2.6s ease-out infinite; }

      /* ==== Premium gold sheen text ========================== */
      .text-champagne {
        background: linear-gradient(120deg, #d4a72c 0%, #f9e08e 25%, #d4a72c 50%, #ffd76a 75%, #d4a72c 100%);
        background-size: 200% 100%;
        -webkit-background-clip: text; background-clip: text; color: transparent;
        animation: shimmer 6s linear infinite;
      }
      .text-noir {
        color: rgb(var(--stone-900));
        text-shadow: 0 1px 0 rgb(255 255 255 / .4);
      }
      .text-shadow-luxe { text-shadow: 0 2px 28px rgb(0 0 0 / .55), 0 1px 2px rgb(0 0 0 / .4); }

      /* ==== Hairline divider with gold stop ================== */
      .hairline-gold {
        height: 1px; width: 100%;
        background: linear-gradient(90deg, transparent, rgb(var(--brand-500) / .55), transparent);
      }

      /* ==== Sticky scroll progress ============================ */
      .scroll-progress {
        position: fixed; top: 0; left: 0; height: 2px; z-index: 60;
        background: linear-gradient(90deg, rgb(var(--brand-400)), #f9e08e, rgb(var(--brand-600)));
        transform-origin: left; transition: transform .15s linear; width: 100%;
      }

      /* ==== Premium parallax helper =========================== */
      [data-parallax] { will-change: transform; transition: transform .1s linear; }

      /* ==== Hover lift micro-interaction ====================== */
      .lift-on-hover { transition: transform .35s cubic-bezier(.16,1,.3,1), box-shadow .35s ease; }
      .lift-on-hover:hover { transform: translateY(-6px); box-shadow: 0 30px 60px -25px rgb(0 0 0 / .25); }

      /* ==== Magnetic underline ================================ */
      .underline-luxe { position: relative; }
      .underline-luxe::after {
        content: ""; position: absolute; left: 0; bottom: -4px; width: 100%; height: 1px;
        background: currentColor; transform: scaleX(0); transform-origin: right;
        transition: transform .5s cubic-bezier(.7,0,.2,1);
      }
      .underline-luxe:hover::after { transform: scaleX(1); transform-origin: left; }

      /* ==== READABILITY SAFETY NET =============================
         Prevents any text from being rendered with crushed contrast.
         Anywhere a child is "text" content (no bg of its own) and the
         class declares an opacity below 70%, browsers will still get
         a hard floor of 0.78 opacity. Cards/overlays/buttons with
         their own bg keep their styling because we scope by tag. */
      p, span, h1, h2, h3, h4, h5, h6, li, a, label, button {
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      /* Force a minimum visible opacity on common low-opacity tailwind tokens */
      .text-white\/10, .text-white\/15, .text-white\/20, .text-white\/25,
      .text-white\/30, .text-white\/35, .text-white\/40, .text-white\/45,
      .text-white\/50, .text-white\/55, .text-white\/60, .text-white\/65 {
        color: rgb(255 255 255 / 0.85) !important;
      }
      .text-cream-100\/10, .text-cream-100\/20, .text-cream-100\/30,
      .text-cream-100\/40, .text-cream-100\/50, .text-cream-100\/60,
      .text-cream-100\/65 {
        color: rgb(var(--cream-100)) !important;
      }
      .text-cream-200\/10, .text-cream-200\/20, .text-cream-200\/25,
      .text-cream-200\/30, .text-cream-200\/35, .text-cream-200\/40,
      .text-cream-200\/45, .text-cream-200\/50, .text-cream-200\/55,
      .text-cream-200\/60, .text-cream-200\/65 {
        color: rgb(var(--cream-100)) !important;
      }
      /* Solid cream tokens used as TEXT must always be light —
         they're a luxe near-white meant for dark photo overlays.
         In dark mode the cream BG variables flip to dark brown,
         which would make text invisible. Lock text usage to a
         fixed light value regardless of theme. */
      .text-cream-50, .text-cream-100, .text-cream-200 {
        color: rgb(250 243 232) !important;
      }
      .text-cream-50\/70, .text-cream-50\/75, .text-cream-50\/80,
      .text-cream-100\/70, .text-cream-100\/75, .text-cream-100\/80,
      .text-cream-100\/85, .text-cream-100\/90, .text-cream-100\/95,
      .text-cream-200\/70, .text-cream-200\/75, .text-cream-200\/80,
      .text-cream-200\/85, .text-cream-200\/90 {
        color: rgb(250 243 232 / 0.92) !important;
      }
      /* Champagne (gold accent) must also stay gold in dark mode */
      .text-champagne {
        color: rgb(231 195 132) !important;
      }

      /* ==== GLOBAL STONE TEXT CONTRAST FLOOR ===================
         Every muted grey used on white/cream cards across the app
         was rendering too light. Lift the whole stone-400→600 ramp
         so body copy, labels, captions and inactive tab text are
         legibly bold on light surfaces. Stone-700/800/900 are kept
         as-is (already strong). White-on-dark callsites use cream
         tokens which have their own rules above. */
      .text-stone-300 { color: #57534e !important; }  /* was very light grey → now stone-600 strength */
      .text-stone-400 { color: #44403c !important; }  /* was light grey → stone-700 */
      .text-stone-500 { color: #292524 !important; }  /* was medium grey → stone-800 */
      .text-stone-600 { color: #1c1917 !important; }  /* was medium-dark → stone-900 */
      /* Tailwind opacity-modifier variants (e.g. text-stone-600/70) */
      [class*="text-stone-300/"], [class*="text-stone-400/"],
      [class*="text-stone-500/"], [class*="text-stone-600/"] {
        color: #292524 !important;
        opacity: 1 !important;
      }
      /* Inputs / textareas / selects on light cards must always render bold */
      input, textarea, select {
        color: #1c1917;
      }
      input::placeholder, textarea::placeholder {
        color: #57534e !important;
        opacity: 1 !important;
      }
      /* Dark-mode override: when the app is in dark theme the cards
         are dark — force these ramps back to a light readable tone. */
      [data-theme="dark"] .text-stone-300,
      [data-theme="dark"] .text-stone-400,
      [data-theme="dark"] .text-stone-500,
      [data-theme="dark"] .text-stone-600,
      [data-theme="dark"] .text-stone-700,
      [data-theme="dark"] .text-stone-800,
      [data-theme="dark"] .text-stone-900 {
        color: #e7e5e4 !important;
      }
      [data-theme="dark"] [class*="text-stone-300/"],
      [data-theme="dark"] [class*="text-stone-400/"],
      [data-theme="dark"] [class*="text-stone-500/"],
      [data-theme="dark"] [class*="text-stone-600/"],
      [data-theme="dark"] [class*="text-stone-700/"],
      [data-theme="dark"] [class*="text-stone-800/"],
      [data-theme="dark"] [class*="text-stone-900/"] {
        color: #e7e5e4 !important;
      }
      [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select {
        color: #fafaf9;
      }
      [data-theme="dark"] input::placeholder, [data-theme="dark"] textarea::placeholder {
        color: #a8a29e !important;
      }

      /* ==== Reduced motion respect ============================ */
